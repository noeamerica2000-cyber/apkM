name: Compilar APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Generar icono de la app (mascara)
        run: |
          if [ -f www/Foto/mascara.png ]; then
            sudo apt-get update && sudo apt-get install -y imagemagick
            ICON=www/Foto/mascara.png
            for pair in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              d=${pair%%:*}; sz=${pair##*:}
              dir=android/app/src/main/res/mipmap-$d
              mkdir -p "$dir"
              convert "$ICON" -resize ${sz}x${sz} -background none -gravity center -extent ${sz}x${sz} "$dir/ic_launcher.png"
              cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
              cp "$dir/ic_launcher.png" "$dir/ic_launcher_foreground.png"
            done
            rm -rf android/app/src/main/res/mipmap-anydpi-v26
            echo "Icono generado desde la mascara."
          else
            echo "No se encontro www/Foto/mascara.png; se usa el icono por defecto."
          fi

      - name: Agregar permisos de musica al manifiesto
        run: |
          sed -i 's#<application#<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>\n    <application#' android/app/src/main/AndroidManifest.xml
          sed -i 's#<application #<application android:requestLegacyExternalStorage="true" #' android/app/src/main/AndroidManifest.xml
          echo "----- Manifiesto -----"
          cat android/app/src/main/AndroidManifest.xml

      - name: Sincronizar
        run: npx cap sync android

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi-Musica-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
